name: Build, Push & Deploy Docker FE

on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 3️⃣ Build & Push Docker image (Có truyền biến Build-arg)
      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            vantrandevops/online-exam-fe:latest
            vantrandevops/online-exam-fe:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}

      # 4️⃣ Giải mã SSH Key (Giống hệt BE)
      - name: Setup EC2 SSH key
        run: |
          echo "$EC2_KEY" | base64 --decode > test-key.pem
          chmod 600 test-key.pem
          ssh -o StrictHostKeyChecking=no -i test-key.pem ec2-user@52.221.192.117 "echo 'SSH connection OK'"
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}

      # 5️⃣ Deploy trên EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: 52.221.192.117
          username: ec2-user
          key_path: test-key.pem     # Chỉ dùng file path, bỏ dòng key_encoding bị dính lỗi cú pháp
          port: 22
          debug: true
          script: |
            # 1. Dừng và xóa container FE cũ
            sudo docker stop online-exam-fe || true            
            sudo docker rm online-exam-fe || true

            # 2. Xóa image FE cũ
            sudo docker rmi vantrandevops/online-exam-fe:latest || true

            # 3. Kéo image FE mới vừa build xong
            sudo docker pull vantrandevops/online-exam-fe:latest

            # 4. Chạy container FE mới
            # LƯU Ý: Thay đổi cổng 80:80 thành cổng mà Frontend của bạn đang dùng (VD: 3000:3000 hoặc 80:3000)
            sudo docker run -d \
              --name online-exam-fe \
              --restart unless-stopped \
              -p 80:80 \
              vantrandevops/online-exam-fe:latest



      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1 # Nhớ đổi lại nếu server AWS của bạn không phải ở Singapore (ap-southeast-1)

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ED5OQ6S5M9G4 --paths "/*"
